# The whole site renders as `live-html` (the r-wasm/quarto-live format) so that
# lessons can host runnable in-browser WebR chunks with a single, uniform theme.
# Pages with no live `{webr}` cells render exactly as before (knitr bakes their
# `{r}` chunks at build time); they simply also carry the small live-runtime asset.
# A lesson opts into live cells by adding the include line documented in
# .claude/course-authoring/interactive-webr.md — do NOT reintroduce a per-file
# `format: html`, which would drop that page out of the shared live-html theme.
format:
  live-html:
    theme:
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss]
    grid:
      body-width: 900px
    toc: true
    code-fold: false
    code-tools: true
    include-after-body: includes/quiz.html

execute:
  freeze: auto
  warning: false

# Scholarly citations: ONE project-wide BibTeX file, owned by the knowledge base.
# Pages with no [@key] citations render exactly as before; pages that cite get a
# References section appended automatically. Convention + where citations may
# appear: .claude/course-authoring/citations.md
bibliography: knowledge/references.bib
link-citations: true
