name: equivalence

# Assert that every from-scratch reimplementation still reproduces its frozen
# reference fixture within tolerance. This is the LIGHT half of the harness: it needs
# only R + jsonlite — no reference library, no Python, no compiler — because every
# reference is already frozen in equivalence/fixtures/*.json. Regenerating those
# fixtures from the real libraries (equivalence/generate/regenerate-all.sh) is a
# separate, heavier authoring step and is intentionally NOT run here.

on:
  push:
    paths:
      - 'equivalence/**'
      - '.github/workflows/equivalence.yml'
  pull_request:
    paths:
      - 'equivalence/**'
      - '.github/workflows/equivalence.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'  # match render.yml / renv.lock
          use-public-rspm: true

      # jsonlite is intentionally left floating (stable API, exercised by the check itself).
      - name: Install jsonlite
        run: Rscript -e 'install.packages("jsonlite")'

      - name: Run equivalence checks
        run: Rscript equivalence/check.R
