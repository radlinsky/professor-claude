name: license-check

# Backstop for issue #12: every course must record a source-license verdict so
# copyrighted / non-open material can't be built on silently. The real check is the
# intake gate in the create-course / port-library / extract-knowledge skills (a human
# confirms flags); this only asserts, mechanically, that each course syllabus and each
# knowledge source record carries a non-empty `**Source license:**` line — catching
# any build that reached a PR without one.
# See .claude/course-authoring/source-licensing.md.

on:
  push:
    branches: [main, develop]
    paths:
      - 'courses/**/syllabus.md'
      - 'knowledge/sources/**'
      - '.github/workflows/license-check.yml'
  pull_request:
    paths:
      - 'courses/**/syllabus.md'
      - 'knowledge/sources/**'
      - '.github/workflows/license-check.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Every course syllabus and knowledge source records a source-license verdict
        run: |
          fail=0
          for f in courses/*/syllabus.md knowledge/sources/*.md; do
            [ -e "$f" ] || continue
            verdict=$(grep -m1 '^\*\*Source license:\*\*' "$f" | sed 's/^\*\*Source license:\*\* *//')
            case "$verdict" in
              ""|*TODO*|*todo*|*unknown*|*UNKNOWN*)
                echo "::error file=$f::missing or placeholder '**Source license:**' line (got: '${verdict:-<none>}')"
                fail=1 ;;
              *)
                echo "OK  $f — $verdict" ;;
            esac
            # Flagged / restrictive verdicts must carry the human-confirmation token.
            # The license-name patterns catch a malformed "OK" asserted against a
            # FLAG-class license (e.g. "GPL-3.0 — OK", "all rights reserved — OK") —
            # keep the list in sync with source-licensing.md §Classify.
            case "$verdict" in
              *[Ff]lag*|*[Rr]estrict*|*GPL*|*MPL*|*CC-BY-SA*|*CC-BY-NC*|*CC-BY-ND*|*"ll rights reserved"*|*[Pp]roprietar*)
                case "$verdict" in
                  *"confirmed by human"*) ;;
                  *) echo "::error file=$f::flagged/restrictive verdict lacks 'confirmed by human YYYY-MM-DD' (got: '$verdict')"
                     fail=1 ;;
                esac ;;
            esac
          done
          exit $fail
