name: render

# Assert the whole Quarto site still renders green — every baked {r} chunk
# executes at build. Live {webr} cells run in-browser, so they are NOT run here.
# HTML-only output (live-html) means no LaTeX. See issue #13.

on:
  push:
    branches: [main]
  pull_request:

# Deploying to GitHub Pages needs write + OIDC; PRs only render (read-only).
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true

      - name: Restore renv library
        uses: r-lib/actions/setup-renv@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.9.38'

      - name: Render site
        run: quarto render

      # Fail on dangling internal links in the rendered site (e.g. a renamed or
      # moved lesson leaving a broken cross-link). --offline checks only local
      # file/anchor targets, so there is no network flakiness — external URLs are
      # intentionally NOT checked here.
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments './_site/**/*.html'
          fail: true

      # Publish _site/ to GitHub Pages — push-to-main only. PRs (incl. from
      # forks, whose token can't deploy) render + link-check above, then stop.
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
