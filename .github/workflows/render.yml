name: render

# Assert the whole Quarto site still renders green — every baked {r} chunk
# executes at build. Live {webr} cells run in-browser, so they are NOT run here.
# HTML-only output (live-html) means no LaTeX. See issue #13.

on:
  push:
    branches: [main, develop]
  pull_request:

# Deploying to GitHub Pages needs write + OIDC; PRs only render (read-only).
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Every lesson/practice/resources page under foundations|courses must be in
      # the _quarto.yml render list, or Quarto never builds it and any link to it
      # 404s on the live site. The lychee step below only checks links BETWEEN
      # rendered pages, so it can't catch a target that was never rendered — this
      # guards the root cause (page exists, not registered). Runs before the slow
      # render so it fails fast.
      - name: Check every page is registered in _quarto.yml
        run: |
          # README.md files are GitHub-facing repo indexes, not rendered site pages.
          missing=$(comm -23 \
            <(find foundations courses \( -name '*.qmd' -o -name '*.md' \) -not -name README.md | sort) \
            <(grep -oP '(?<=- )(foundations|courses)/\S+\.(qmd|md)' _quarto.yml | sort -u))
          if [ -n "$missing" ]; then
            echo "::error::Pages not in _quarto.yml render list:"; echo "$missing"; exit 1
          fi

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true

      - name: Restore renv library
        uses: r-lib/actions/setup-renv@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.9.38'

      - name: Render site
        run: quarto render

      # Fail on dangling internal links in the rendered site (e.g. a renamed or
      # moved lesson leaving a broken cross-link). --offline checks only local
      # file/anchor targets, so there is no network flakiness — external URLs are
      # intentionally NOT checked here.
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments './_site/**/*.html'
          fail: true

      # Prep the Pages artifact — push-to-main only. PRs (incl. from forks, whose
      # token can't deploy) render + link-check above, then stop.
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Separate job so ONLY the deploy carries the github-pages environment. Its
  # branch policy is evaluated at job start (before steps), which is why binding
  # it to the render job would block every PR — see PR #4.
  deploy:
    needs: render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize Pages deploys so rapid pushes to main don't race; never cancel an
    # in-flight publish. Scoped to this job so PR/develop renders aren't queued.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
